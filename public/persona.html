<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Persona — OpenRP AI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="/assets/css/styles.css" />
  </head>
  <body>
    <div class="d-flex min-vh-100">
      <div id="sidebar-root" class="flex-shrink-0"></div>

      <div class="flex-grow-1 overflow-auto">
        <main class="content-main p-3 p-md-4">
          <div class="mx-auto" style="max-width:600px;">

            <div class="mb-4">
              <h1 id="page-title" class="fw-bold mb-1" style="font-size:clamp(1.8rem,3vw,2.4rem); letter-spacing:-0.04em;">Cadastrar sua persona</h1>
              <p id="page-description" class="text-secondary mb-0">Antes de continuar, informe o nome e a descrição do seu personagem principal.</p>
            </div>

            <div class="glass-card card p-4">

              <div id="loading-state" class="text-secondary small mb-3">
                <i class="bi bi-hourglass-split me-1"></i>Carregando dados da persona…
              </div>

              <form id="persona-form">
                <div class="mb-3">
                  <label class="form-label" for="name">Nome <span class="text-danger">*</span></label>
                  <input id="name" name="name" type="text" class="form-control" placeholder="Ex: Arya Stark" required />
                </div>

                <div class="mb-3">
                  <label class="form-label" for="description">Descrição <span class="text-danger">*</span></label>
                  <textarea id="description" name="description" class="form-control" placeholder="Descreva a persona..."></textarea>
                </div>

                <div class="mb-4">
                  <label class="form-label" for="avatar_url">URL do avatar <span class="text-secondary fw-normal">(opcional)</span></label>
                  <input id="avatar_url" name="avatar_url" type="url" class="form-control" placeholder="https://..." />
                </div>

                <div id="msg-error" class="alert-glass-error mb-3" role="status" style="display:none;"></div>

                <button type="submit" class="btn-sky w-100">
                  <i class="bi bi-check-circle me-2"></i>Salvar persona
                </button>
              </form>

              <p class="text-secondary small text-center mt-3 mb-0">
                Após salvar, você será redirecionado para a página principal.
              </p>
            </div>

          </div>
        </main>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/sidebar.js"></script>
    <script>
      const form        = document.getElementById('persona-form');
      const msgError    = document.getElementById('msg-error');
      const loadingEl   = document.getElementById('loading-state');
      const pageTitle   = document.getElementById('page-title');
      const pageDesc    = document.getElementById('page-description');
      const sidebarRoot = document.getElementById('sidebar-root');

      async function fetchPersona() {
        const response = await fetch('/api/persona');
        if (response.status === 404) return null;
        if (!response.ok) throw new Error('Falha ao carregar a persona');
        return (await response.json()).persona;
      }

      async function initializePage() {
        try {
          const persona = await fetchPersona();
          loadingEl.style.display = 'none';

          if (persona) {
            pageTitle.textContent = 'Editar persona';
            pageDesc.textContent  = 'Atualize os dados da sua persona quando desejar.';
            document.getElementById('name').value        = persona.name        || '';
            document.getElementById('description').value = persona.description || '';
            document.getElementById('avatar_url').value  = persona.avatar_url  || '';
            await loadSidebar();
          } else {
            loadingEl.style.display = 'none';
          }
        } catch (err) {
          loadingEl.innerHTML = `<span class="text-danger"><i class="bi bi-exclamation-triangle me-1"></i>${err.message}</span>`;
        }
      }

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        msgError.style.display = 'none';

        const data = {
          name:        document.getElementById('name').value.trim(),
          description: document.getElementById('description').value.trim(),
          avatar_url:  document.getElementById('avatar_url').value.trim() || null,
        };

        if (!data.name || !data.description) {
          msgError.textContent = 'Por favor, preencha o nome e a descrição.';
          msgError.style.display = 'block';
          return;
        }

        try {
          const response = await fetch('/api/persona', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data),
          });
          const result = await response.json();
          if (!response.ok || !result.ok) throw new Error(result.message || 'Falha ao salvar persona');
          window.location.href = '/';
        } catch (err) {
          msgError.textContent = err.message || 'Erro ao salvar persona. Tente novamente.';
          msgError.style.display = 'block';
        }
      });

      window.addEventListener('load', initializePage);
    </script>
  </body>
</html>
