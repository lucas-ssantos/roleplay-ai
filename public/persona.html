<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Persona — OpenRP AI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="/assets/css/styles.css" />
    <link rel="stylesheet" href="/assets/css/sidebar.css" />
  </head>
  <body>
    <div class="d-flex min-vh-100">
      <div id="sidebar-root" class="flex-shrink-0"></div>

      <div class="flex-grow-1 overflow-auto">
        <main class="content-main p-3 p-md-4">
          <div class="mx-auto" style="max-width:600px;">

            <div class="mb-4">
              <h1 id="page-title" class="fw-bold mb-1" style="font-size:clamp(1.8rem,3vw,2.4rem); letter-spacing:-0.04em;">Cadastrar sua persona</h1>
              <p id="page-description" class="text-secondary mb-0">Antes de continuar, informe o nome e a descrição do seu personagem principal.</p>
            </div>

            <div class="glass-card card p-4">

              <div id="loading-state" class="text-secondary small mb-3">
                <i class="bi bi-hourglass-split me-1"></i>Carregando dados da persona…
              </div>

              <form id="persona-form">
                <div class="mb-3">
                  <label class="form-label" for="name">Nome <span class="text-danger">*</span></label>
                  <input id="name" name="name" type="text" class="form-control" placeholder="Ex: Arya Stark" required />
                </div>

                <div class="mb-3">
                  <label class="form-label" for="description">Descrição <span class="text-danger">*</span></label>
                  <textarea id="description" name="description" class="form-control" placeholder="Descreva a persona..."></textarea>
                </div>

                <div class="mb-4">
                  <label class="form-label" for="avatar_url">URL do avatar <span class="text-secondary fw-normal">(opcional)</span></label>
                  <input id="avatar_url" name="avatar_url" type="url" class="form-control" placeholder="https://..." />
                </div>

                <div id="msg-error" class="alert-glass-error mb-3" role="status" style="display:none;"></div>

                <button type="submit" class="btn-sky w-100">
                  <i class="bi bi-check-circle me-2"></i>Salvar persona
                </button>
              </form>

              <p class="text-secondary small text-center mt-3 mb-0">
                Após salvar, você será redirecionado para a página principal.
              </p>
            </div>

          </div>
        </main>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/sidebar.js"></script>
    <script src="/assets/js/persona.js"></script>
  </body>
</html>
