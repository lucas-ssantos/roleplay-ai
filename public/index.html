<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenRP AI — Personagens</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, system-ui, sans-serif;
        background: #020617;
        color: #e2e8f0;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(circle at top, rgba(56, 189, 248, 0.12), transparent 30%),
          radial-gradient(circle at 20% 20%, rgba(59, 130, 246, 0.12), transparent 28%),
          #020617;
        padding: 2rem;
      }

      .layout {
        display: grid;
        grid-template-columns: 280px 1fr;
        gap: 1.5rem;
      }

      .main-content {
        min-width: 0;
      }

      .page {
        width: min(1180px, 100%);
      }

      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        margin-bottom: 1.5rem;
      }

      .header h1 {
        margin: 0;
        font-size: clamp(2rem, 2.5vw, 2.75rem);
        letter-spacing: -0.04em;
      }

      .header p {
        margin: 0.35rem 0 0;
        color: #94a3b8;
        max-width: 40rem;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 1.3rem;
      }

      .card {
        background: rgba(15, 23, 42, 0.95);
        border: 1px solid rgba(148, 163, 184, 0.12);
        border-radius: 1.25rem;
        overflow: hidden;
        display: grid;
        grid-template-rows: auto 1fr;
        transition: transform 0.25s ease, border-color 0.25s ease, background-color 0.25s ease;
      }

      .card:hover {
        transform: translateY(-4px);
        border-color: rgba(56, 189, 248, 0.35);
        background: rgba(15, 23, 42, 1);
      }

      .card-figure {
        position: relative;
        min-height: 180px;
        aspect-ratio: 4 / 3;
        background: linear-gradient(180deg, rgba(56, 189, 248, 0.14), rgba(15, 23, 42, 0.9));
      }

      .card-figure img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .card-figure.placeholder {
        display: grid;
        place-items: center;
        color: #94a3b8;
        font-size: 0.95rem;
        padding: 1rem;
      }

      .card-content {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 1.4rem;
        min-height: 220px;
      }

      .card-title {
        font-size: 1.18rem;
        margin: 0 0 0.35rem;
      }

      .card-subtitle {
        margin: 0;
        color: #94a3b8;
        font-size: 0.95rem;
      }

      .card-body {
        flex: 1;
        margin: 1rem 0;
        color: #cbd5e1;
        line-height: 1.7;
      }

      .card-meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.45rem 0.75rem;
        border-radius: 999px;
        background: rgba(59, 130, 246, 0.14);
        color: #bfdbfe;
        font-size: 0.82rem;
      }

      .status-pill {
        display: inline-flex;
        align-items: center;
        padding: 0.45rem 0.7rem;
        border-radius: 999px;
        font-size: 0.85rem;
      }

      .status-ok {
        background: rgba(34, 197, 94, 0.12);
        color: #86efac;
      }

      .status-error {
        background: rgba(248, 113, 113, 0.14);
        color: #fecaca;
      }

      .card-add {
        display: grid;
        place-items: center;
        text-align: center;
        gap: 1rem;
        border-style: dashed;
        color: #38bdf8;
        min-height: 320px;
      }

      .card-add:hover {
        border-color: rgba(56, 189, 248, 0.45);
        background: rgba(15, 23, 42, 1);
      }

      .card-add .plus {
        width: 3rem;
        height: 3rem;
        display: grid;
        place-items: center;
        border-radius: 999px;
        border: 1px solid rgba(56, 189, 248, 0.45);
        font-size: 1.8rem;
        background: rgba(56, 189, 248, 0.08);
      }

      @media (max-width: 900px) {
        .card-content {
          padding: 1.25rem;
        }
      }

      @media (max-width: 640px) {
        body {
          padding: 1rem;
        }

        .page {
          width: 100%;
        }

        .card-add {
          min-height: 280px;
        }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <div id="sidebar-root"></div>
      <main class="main-content">
        <div class="page">
          <div class="header">
        <div>
          <h1>Personagens</h1>
          <p>Selecione um personagem para começar a conversa ou adicione um novo perfil à sua coleção.</p>
        </div>
      </div>

      <div class="grid" id="character-grid">
        <div class="card card-add" role="button" onclick="addCharacter()">
          <div class="plus">+</div>
          <div>
            <h2 class="card-title">Novo personagem</h2>
            <p class="card-body">Crie um personagem para começar a roleplay.</p>
          </div>
        </div>
      </div>
    </div>

    <script>
      async function loadCharacters() {
        try {
          const res = await fetch('/api/characters');
          if (!res.ok) throw new Error('Falha ao carregar personagens');
          const data = await res.json();

          const grid = document.getElementById('character-grid');
          grid.innerHTML = `
            <div class="card card-add" role="button" onclick="addCharacter()">
              <div class="plus">+</div>
              <div>
                <h2 class="card-title">Novo personagem</h2>
                <p class="card-body">Crie um personagem para começar a roleplay.</p>
              </div>
            </div>
          `;

          if (data.ok && Array.isArray(data.characters) && data.characters.length > 0) {
            data.characters.forEach((character) => {
              const card = document.createElement('article');
              card.className = 'card';
              card.innerHTML = `
                <div class="card-figure">
                  ${character.avatar_url
                    ? `<img src="${character.avatar_url}" alt="Avatar de ${character.display_name || character.name}" />`
                    : `<div class="card-figure placeholder">Sem imagem disponível</div>`}
                </div>
                <div class="card-content">
                  <div>
                    <h2 class="card-title">${character.display_name || character.name}</h2>
                    <p class="card-subtitle">${character.description || 'Sem descrição disponível.'}</p>
                  </div>
                  <div class="card-body">${character.personality || 'Personalidade não definida.'}</div>
                  <div class="card-meta">
                    <span class="badge">${character.name}</span>
                    <span class="status-pill status-ok">Pronto</span>
                  </div>
                </div>
              `;
              grid.appendChild(card);
            });
          }
        } catch (err) {
          console.error(err);
        }
      }

      function addCharacter() {
        const name = prompt('Nome do personagem:');
        if (!name) return;
        alert('Funcionalidade de criação será implementada em breve.');
      }

      async function loadSidebar() {
        const sidebar = await fetch('/sidebar.html');
        const html = await sidebar.text();
        document.getElementById('sidebar-root').innerHTML = html;
        document.querySelectorAll('.nav-links a').forEach((link) => {
          if (link.dataset.path === window.location.pathname) {
            link.classList.add('active');
          }
        });
      }

      window.addEventListener('load', async () => {
        await loadSidebar();
        loadCharacters();
      });
    </script>
  </main>
</div>
  </body>
</html>
