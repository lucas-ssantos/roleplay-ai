<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenRP AI — Personagens</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="/assets/css/styles.css" />
    <style>
      .char-card {
        cursor: pointer;
        transition: transform 0.22s ease, border-color 0.22s ease;
        overflow: hidden;
      }
      .char-card:hover {
        transform: translateY(-5px);
        border-color: rgba(56, 189, 248, 0.4) !important;
      }

      .card-thumb {
        height: 190px;
        object-fit: cover;
        width: 100%;
      }

      .card-thumb-placeholder {
        height: 190px;
        background: linear-gradient(180deg, rgba(56,189,248,.14), rgba(15,23,42,.9));
        display: flex;
        align-items: center;
        justify-content: center;
        color: #64748b;
        font-size: 0.9rem;
      }

      .add-card {
        cursor: pointer;
        border-style: dashed !important;
        border-color: rgba(56, 189, 248, 0.3) !important;
        color: #38bdf8;
        min-height: 320px;
        transition: border-color 0.2s, background 0.2s;
      }
      .add-card:hover {
        border-color: rgba(56, 189, 248, 0.55) !important;
        background: rgba(15, 23, 42, 1) !important;
      }

      .add-icon {
        width: 3rem;
        height: 3rem;
        border-radius: 50%;
        border: 1px solid rgba(56, 189, 248, 0.4);
        background: rgba(56, 189, 248, 0.08);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.6rem;
        line-height: 1;
      }
    </style>
  </head>
  <body>
    <div class="d-flex min-vh-100">
      <div id="sidebar-root" class="flex-shrink-0"></div>

      <div class="flex-grow-1 overflow-auto">
        <main class="content-main p-3 p-md-4">

          <div class="mb-4">
            <h1 class="fw-bold mb-1" style="font-size:clamp(1.8rem,3vw,2.5rem); letter-spacing:-0.04em;">Personagens</h1>
            <p class="text-secondary mb-0">Selecione um personagem para conversar ou adicione um novo à sua coleção.</p>
          </div>

          <div class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 row-cols-xl-4 g-4" id="character-grid">

            <!-- Add card (static) -->
            <div class="col">
              <div class="card glass-card add-card h-100 d-flex flex-column align-items-center justify-content-center text-center p-4"
                   role="button" onclick="addCharacter()">
                <div class="add-icon mb-3">+</div>
                <h5 class="mb-1 fw-semibold" style="color:#38bdf8;">Novo personagem</h5>
                <p class="text-secondary small mb-0">Crie um personagem para começar o roleplay.</p>
              </div>
            </div>

          </div>
        </main>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/sidebar.js"></script>
    <script>
      async function loadCharacters() {
        try {
          const res = await fetch('/api/characters');
          if (!res.ok) throw new Error('Falha ao carregar personagens');
          const data = await res.json();

          const grid = document.getElementById('character-grid');

          if (data.ok && Array.isArray(data.characters) && data.characters.length > 0) {
            data.characters.forEach((character) => {
              const col = document.createElement('div');
              col.className = 'col';

              const thumb = character.avatar_url
                ? `<img src="${character.avatar_url}" class="card-thumb" alt="Avatar de ${character.name}" />`
                : `<div class="card-thumb-placeholder"><i class="bi bi-person-circle fs-1 opacity-25"></i></div>`;

              col.innerHTML = `
                <div class="card glass-card char-card h-100">
                  ${thumb}
                  <div class="card-body d-flex flex-column gap-2">
                    <h5 class="card-title mb-0 fw-semibold">${character.name}</h5>
                    <p class="text-secondary small mb-0" style="line-height:1.5;">${character.scenario || character.description || 'Sem descrição disponível.'}</p>
                    <p class="flex-grow-1 mb-0" style="color:#cbd5e1; font-size:.88rem; line-height:1.65;">${character.personality || 'Personalidade não definida.'}</p>
                    <div class="d-flex align-items-center justify-content-between pt-2 mt-1" style="border-top:1px solid rgba(148,163,184,0.1);">
                      <span class="badge-blue">${character.name}</span>
                      <span class="badge-green"><i class="bi bi-circle-fill me-1" style="font-size:.5rem;"></i>Pronto</span>
                    </div>
                  </div>
                </div>
              `;

              col.querySelector('.char-card').addEventListener('click', () => {
                window.location.href = `/chat/${character.id}`;
              });

              grid.appendChild(col);
            });
          }
        } catch (err) {
          console.error(err);
        }
      }

      function addCharacter() {
        window.location.href = '/character/new';
      }

      window.addEventListener('load', async () => {
        await loadSidebar();
        loadCharacters();
      });
    </script>
  </body>
</html>
