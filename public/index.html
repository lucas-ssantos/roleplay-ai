<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenRP AI — Personagens</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="/assets/css/styles.css" />
    <link rel="stylesheet" href="/assets/css/sidebar.css" />
    <link rel="stylesheet" href="/assets/css/index.css" />
  </head>
  <body>
    <div class="d-flex min-vh-100">
      <div id="sidebar-root" class="flex-shrink-0"></div>

      <div class="flex-grow-1 overflow-auto">
        <main class="content-main p-3 p-md-4">

          <div class="mb-4">
            <h1 class="fw-bold mb-1" style="font-size:clamp(1.8rem,3vw,2.5rem); letter-spacing:-0.04em;">Personagens</h1>
            <p class="text-secondary mb-0">Selecione um personagem para conversar ou adicione um novo à sua coleção.</p>
          </div>

          <div class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 row-cols-xl-4 g-4" id="character-grid">

            <!-- Add card (static) -->
            <div class="col">
              <div class="card glass-card add-card h-100 d-flex flex-column align-items-center justify-content-center text-center p-4"
                   role="button" onclick="addCharacter()">
                <div class="add-icon mb-3">+</div>
                <h5 class="mb-1 fw-semibold" style="color:#38bdf8;">Novo personagem</h5>
                <p class="text-secondary small mb-0">Crie um personagem para começar o roleplay.</p>
              </div>
            </div>

          </div>
        </main>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/sidebar.js"></script>
    <script src="/assets/js/index.js"></script>
  </body>
</html>
