<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat — OpenRP AI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        height: 100%;
        overflow: hidden;
        font-family: Inter, system-ui, sans-serif;
        color: #f1f5f9;
        background: #020617;
      }

      /* ── Background portrait ── */
      .bg {
        position: fixed;
        inset: 0;
        z-index: 0;
        background-size: cover;
        background-position: center top;
        background-repeat: no-repeat;
        transition: opacity 0.6s ease;
      }

      .bg-overlay {
        position: fixed;
        inset: 0;
        z-index: 1;
        background: linear-gradient(
          to bottom,
          rgba(2, 6, 23, 0.25) 0%,
          rgba(2, 6, 23, 0.45) 35%,
          rgba(2, 6, 23, 0.82) 65%,
          rgba(2, 6, 23, 0.97) 100%
        );
      }

      /* ── Layout ── */
      .chat-layout {
        position: relative;
        z-index: 2;
        display: flex;
        flex-direction: column;
        height: 100dvh;
        height: 100vh;
      }

      /* ── Header ── */
      .chat-header {
        display: flex;
        align-items: center;
        gap: 0.9rem;
        padding: 0.9rem 1.25rem;
        background: rgba(2, 6, 23, 0.45);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.07);
        flex-shrink: 0;
      }

      .back-btn {
        display: grid;
        place-items: center;
        width: 2.25rem;
        height: 2.25rem;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: #e2e8f0;
        text-decoration: none;
        flex-shrink: 0;
        transition: background 0.2s;
      }

      .back-btn:hover {
        background: rgba(255, 255, 255, 0.14);
      }

      .header-avatar {
        width: 2.6rem;
        height: 2.6rem;
        border-radius: 50%;
        object-fit: cover;
        flex-shrink: 0;
        border: 2px solid rgba(56, 189, 248, 0.5);
        display: none;
      }

      .header-info {
        flex: 1;
        min-width: 0;
      }

      .header-name {
        font-size: 1.05rem;
        font-weight: 700;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .header-scenario {
        font-size: 0.8rem;
        color: #94a3b8;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* ── Messages ── */
      .messages {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
        padding: 1.25rem 1.25rem 0.5rem;
        display: flex;
        flex-direction: column;
        gap: 0.7rem;
        scrollbar-width: thin;
        scrollbar-color: rgba(148, 163, 184, 0.18) transparent;
      }

      /* Spacer to push messages to bottom when few exist */
      .messages::before {
        content: '';
        flex: 1 0 0;
      }

      /* ── Message row (bubble + rollback btn) ── */
      .msg-row {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        max-width: min(82%, 580px);
        animation: fadeSlide 0.22s ease both;
      }

      .msg-row-char { align-self: flex-start; }
      .msg-row-user { align-self: flex-end; flex-direction: row-reverse; }

      /* ── Bubbles ── */
      .bubble {
        padding: 0.8rem 1.1rem;
        line-height: 1.65;
        font-size: 0.95rem;
        word-break: break-word;
        white-space: pre-wrap;
        min-width: 0;
      }

      @keyframes fadeSlide {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .bubble-char {
        background: rgba(15, 23, 42, 0.78);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 0 1.25rem 1.25rem 1.25rem;
        color: #e2e8f0;
      }

      .bubble-user {
        background: rgba(56, 189, 248, 0.88);
        color: #020617;
        border-radius: 1.25rem 1.25rem 0 1.25rem;
        font-weight: 500;
      }

      /* ── Rollback button ── */
      .rollback-btn {
        flex-shrink: 0;
        width: 1.65rem;
        height: 1.65rem;
        border-radius: 50%;
        background: rgba(15, 23, 42, 0.85);
        border: 1px solid rgba(148, 163, 184, 0.18);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        color: #64748b;
        font-size: 0.78rem;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.18s, background 0.18s, color 0.18s, border-color 0.18s;
      }

      .msg-row:hover .rollback-btn {
        opacity: 1;
        pointer-events: auto;
      }

      .rollback-btn:hover {
        background: rgba(239, 68, 68, 0.15);
        border-color: rgba(239, 68, 68, 0.4);
        color: #fca5a5;
      }

      /* ── Regenerate button (only on last char bubble) ── */
      .regenerate-btn {
        flex-shrink: 0;
        width: 1.65rem;
        height: 1.65rem;
        border-radius: 50%;
        background: rgba(15, 23, 42, 0.85);
        border: 1px solid rgba(148, 163, 184, 0.18);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        color: #38bdf8;
        font-size: 0.78rem;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.18s, background 0.18s, color 0.18s, border-color 0.18s;
      }

      .msg-row:hover .regenerate-btn {
        opacity: 1;
        pointer-events: auto;
      }

      .regenerate-btn:hover {
        background: rgba(56, 189, 248, 0.12);
        border-color: rgba(56, 189, 248, 0.35);
        color: #7dd3fc;
      }

      .regenerate-btn:disabled {
        opacity: 0.35 !important;
        cursor: not-allowed;
        pointer-events: none;
      }

      /* ── Action text *between asterisks* ── */
      .action-text {
        font-style: italic;
        opacity: 0.58;
      }

      /* ── Typing indicator ── */
      .typing-bubble {
        display: flex;
        gap: 5px;
        align-items: center;
        padding: 0.75rem 1rem;
        width: fit-content;
      }

      .dot {
        width: 7px;
        height: 7px;
        background: #64748b;
        border-radius: 50%;
        animation: bounce 1.3s ease-in-out infinite;
      }

      .dot:nth-child(2) {
        animation-delay: 0.18s;
      }

      .dot:nth-child(3) {
        animation-delay: 0.36s;
      }

      @keyframes bounce {
        0%,
        80%,
        100% {
          transform: translateY(0);
        }
        40% {
          transform: translateY(-7px);
        }
      }

      /* ── System / error messages ── */
      .system-msg {
        align-self: center;
        text-align: center;
        color: #fda4af;
        font-size: 0.82rem;
        background: rgba(248, 113, 113, 0.1);
        border: 1px solid rgba(248, 113, 113, 0.18);
        border-radius: 0.75rem;
        padding: 0.5rem 0.9rem;
        max-width: min(80%, 440px);
        animation: fadeSlide 0.22s ease both;
      }

      /* ── Input area ── */
      .input-area {
        flex-shrink: 0;
        display: flex;
        align-items: flex-end;
        gap: 0.7rem;
        padding: 0.9rem 1.25rem 1.1rem;
        background: rgba(2, 6, 23, 0.55);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        border-top: 1px solid rgba(255, 255, 255, 0.07);
      }

      #msg-input {
        flex: 1;
        background: rgba(15, 23, 42, 0.82);
        border: 1px solid rgba(148, 163, 184, 0.22);
        border-radius: 1.1rem;
        color: #e2e8f0;
        padding: 0.75rem 1rem;
        font: inherit;
        font-size: 0.95rem;
        resize: none;
        max-height: 130px;
        overflow-y: auto;
        line-height: 1.55;
        transition: border-color 0.2s;
        scrollbar-width: none;
      }

      #msg-input::placeholder {
        color: #475569;
      }

      #msg-input:focus {
        outline: none;
        border-color: rgba(56, 189, 248, 0.4);
      }

      #msg-input:disabled {
        opacity: 0.6;
      }

      .send-btn {
        width: 2.75rem;
        height: 2.75rem;
        border: none;
        border-radius: 50%;
        background: #38bdf8;
        color: #020617;
        cursor: pointer;
        display: grid;
        place-items: center;
        flex-shrink: 0;
        transition: background 0.2s, transform 0.15s, opacity 0.2s;
      }

      .send-btn:hover:not(:disabled) {
        background: #0ea5e9;
        transform: scale(1.06);
      }

      .send-btn:disabled {
        background: rgba(56, 189, 248, 0.35);
        cursor: not-allowed;
        transform: none;
      }

      /* ── Scrollbar ── */
      .messages::-webkit-scrollbar {
        width: 4px;
      }
      .messages::-webkit-scrollbar-track {
        background: transparent;
      }
      .messages::-webkit-scrollbar-thumb {
        background: rgba(148, 163, 184, 0.2);
        border-radius: 2px;
      }

      /* ── Menu toggle button ── */
      .menu-btn {
        display: grid;
        place-items: center;
        width: 2.25rem;
        height: 2.25rem;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: #e2e8f0;
        cursor: pointer;
        flex-shrink: 0;
        transition: background 0.2s;
      }
      .menu-btn:hover {
        background: rgba(255, 255, 255, 0.14);
      }

      /* ── Chat offcanvas ── */
      #chatNav {
        width: 260px !important;
        background: rgba(6, 12, 30, 0.97) !important;
        backdrop-filter: blur(20px) !important;
        -webkit-backdrop-filter: blur(20px) !important;
        border-right: 1px solid rgba(148, 163, 184, 0.1) !important;
      }

      #chatNav .offcanvas-header {
        border-bottom: 1px solid rgba(148, 163, 184, 0.1);
        padding: 1.25rem 1.25rem 1rem;
      }

      #chatNav .offcanvas-body {
        padding: 1rem;
        display: flex;
        flex-direction: column;
        gap: 1.25rem;
        overflow-y: auto;
      }

      /* Recent chars shortcuts (chat offcanvas) */
      #chatNav .recent-chars-list {
        display: flex;
        flex-direction: column;
        gap: 0.15rem;
        margin-top: 0.2rem;
        padding-left: 0.35rem;
      }

      #chatNav .recent-char-link {
        display: flex;
        align-items: center;
        gap: 0.55rem;
        padding: 0.4rem 0.65rem;
        border-radius: 0.75rem;
        text-decoration: none;
        color: #94a3b8;
        font-size: 0.84rem;
        transition: background 0.18s, color 0.18s;
        border: 1px solid transparent;
        overflow: hidden;
      }

      #chatNav .recent-char-link:hover {
        background: rgba(56, 189, 248, 0.09);
        border-color: rgba(56, 189, 248, 0.18);
        color: #e2e8f0;
      }

      #chatNav .recent-char-avatar {
        width: 1.45rem;
        height: 1.45rem;
        border-radius: 50%;
        object-fit: cover;
        flex-shrink: 0;
      }

      #chatNav .recent-char-placeholder {
        width: 1.45rem;
        height: 1.45rem;
        border-radius: 50%;
        background: rgba(56, 189, 248, 0.1);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.65rem;
        color: #38bdf8;
        flex-shrink: 0;
      }

      #chatNav .recent-char-name {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        flex: 1;
        min-width: 0;
      }

      .chat-nav-char {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.75rem;
        background: rgba(15, 23, 42, 0.7);
        border: 1px solid rgba(148, 163, 184, 0.1);
        border-radius: 1rem;
      }

      .chat-nav-avatar {
        width: 2.75rem;
        height: 2.75rem;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid rgba(56, 189, 248, 0.4);
        flex-shrink: 0;
        display: none;
      }

      .chat-nav-avatar-placeholder {
        width: 2.75rem;
        height: 2.75rem;
        border-radius: 50%;
        background: rgba(56, 189, 248, 0.12);
        border: 2px solid rgba(56, 189, 248, 0.25);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        color: #38bdf8;
        font-size: 1.1rem;
      }

      .chat-nav-name {
        font-weight: 700;
        font-size: 0.95rem;
        color: #f1f5f9;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .chat-nav-scenario {
        font-size: 0.78rem;
        color: #64748b;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .chat-nav-links {
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
      }

      .chat-nav-links a {
        display: flex;
        align-items: center;
        gap: 0.65rem;
        padding: 0.7rem 0.9rem;
        border-radius: 0.85rem;
        text-decoration: none;
        color: #cbd5e1;
        border: 1px solid transparent;
        font-size: 0.93rem;
        transition: background 0.18s, border-color 0.18s, color 0.18s;
      }

      .chat-nav-links a:hover {
        background: rgba(56, 189, 248, 0.12);
        border-color: rgba(56, 189, 248, 0.25);
        color: #f8fafc;
      }

      .chat-nav-section {
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.07em;
        text-transform: uppercase;
        color: #334155;
        padding: 0 0.5rem;
        margin-bottom: 0.25rem;
      }

      /* ── Desktop enhancement ── */
      @media (min-width: 900px) {
        .chat-layout {
          max-width: 680px;
          margin: 0 auto;
        }

        .bg-overlay {
          background: linear-gradient(
            to right,
            rgba(2, 6, 23, 0.1) 0%,
            rgba(2, 6, 23, 0.05) 35%,
            rgba(2, 6, 23, 0.55) 55%,
            rgba(2, 6, 23, 0.98) 72%,
            rgba(2, 6, 23, 0.99) 100%
          ),
          linear-gradient(
            to bottom,
            rgba(2, 6, 23, 0.2) 0%,
            rgba(2, 6, 23, 0.7) 70%,
            rgba(2, 6, 23, 0.98) 100%
          );
        }
      }
    </style>
  </head>
  <body>
    <!-- ── Offcanvas menu ─────────────────────────────────────────── -->
    <div class="offcanvas offcanvas-start" tabindex="-1" id="chatNav">
      <div class="offcanvas-header">
        <span style="font-weight:700; font-size:.95rem; letter-spacing:-.02em; color:#f8fafc;">OpenRP AI</span>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Fechar"></button>
      </div>
      <div class="offcanvas-body">

        <!-- Personagem atual -->
        <div class="chat-nav-char">
          <img class="chat-nav-avatar" id="nav-avatar" alt="" />
          <div class="chat-nav-avatar-placeholder" id="nav-avatar-placeholder">
            <i class="bi bi-person-fill"></i>
          </div>
          <div style="min-width:0;">
            <div class="chat-nav-name" id="nav-char-name">—</div>
            <div class="chat-nav-scenario" id="nav-char-scenario">Em conversa</div>
          </div>
        </div>

        <!-- TOP: Personagens + recent chars shortcuts -->
        <div>
          <div class="chat-nav-section">Personagens</div>
          <nav class="chat-nav-links">
            <a href="/"><i class="bi bi-person-circle"></i> Todos os personagens</a>
          </nav>
          <div class="recent-chars-list"></div>
        </div>

        <!-- Spacer -->
        <div style="flex:1;"></div>

        <!-- BOTTOM: Persona, Configurações, Banco de Dados -->
        <div style="border-top:1px solid rgba(148,163,184,0.1); padding-top:.75rem;">
          <nav class="chat-nav-links">
            <a href="/persona"><i class="bi bi-person-badge"></i> Persona</a>
            <a href="/settings"><i class="bi bi-sliders"></i> Configurações</a>
            <a href="/api/viewdb"><i class="bi bi-database"></i> Banco de Dados</a>
          </nav>
        </div>

        <!-- Conversa -->
        <div style="border-top:1px solid rgba(148,163,184,0.1); padding-top:.75rem;">
          <div class="chat-nav-section">Conversa</div>
          <nav class="chat-nav-links">
            <a href="/" id="nav-new-chat" style="color:#38bdf8;">
              <i class="bi bi-plus-circle"></i> Nova conversa
            </a>
          </nav>
        </div>

      </div>
    </div>

    <!-- ── Rollback confirmation modal ──────────────────────────────── -->
    <div class="modal fade" id="rollbackModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered" style="max-width:360px;">
        <div class="modal-content" style="background:rgba(6,12,30,0.98); border:1px solid rgba(148,163,184,0.15); border-radius:1.1rem;">
          <div class="modal-header" style="border-bottom:1px solid rgba(148,163,184,0.1); padding:1.1rem 1.25rem .85rem;">
            <h6 class="modal-title mb-0" style="color:#f1f5f9; font-weight:700; font-size:.95rem;">
              <i class="bi bi-arrow-counterclockwise me-2" style="color:#f87171;"></i>Retroceder mensagem
            </h6>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" style="font-size:.8rem;"></button>
          </div>
          <div class="modal-body" style="color:#94a3b8; font-size:.88rem; line-height:1.65; padding:1.1rem 1.25rem;">
            <p class="mb-2">Deseja retroceder a esta mensagem?</p>
            <p class="mb-0" style="color:#fca5a5; font-size:.82rem;">
              <i class="bi bi-exclamation-triangle me-1"></i>
              Esta ação é <strong style="color:#f87171;">irreversível</strong>. Todas as mensagens mais recentes serão apagadas permanentemente.
            </p>
          </div>
          <div class="modal-footer" style="border-top:1px solid rgba(148,163,184,0.1); padding:.85rem 1.25rem; gap:.5rem;">
            <button type="button" data-bs-dismiss="modal"
                    style="background:rgba(30,41,59,.7); border:1px solid rgba(148,163,184,.2); color:#cbd5e1; border-radius:.75rem; padding:.35rem .9rem; font-size:.85rem; cursor:pointer;">
              Cancelar
            </button>
            <button type="button" id="rollback-confirm-btn"
                    style="background:rgba(239,68,68,.18); border:1px solid rgba(239,68,68,.4); color:#fca5a5; border-radius:.75rem; padding:.35rem .9rem; font-size:.85rem; cursor:pointer;">
              <i class="bi bi-arrow-counterclockwise me-1"></i>Retroceder
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="bg" id="bg"></div>
    <div class="bg-overlay"></div>

    <div class="chat-layout">
      <header class="chat-header">
        <button class="menu-btn"
                data-bs-toggle="offcanvas"
                data-bs-target="#chatNav"
                title="Menu"
                aria-label="Abrir menu">
          <i class="bi bi-list" style="font-size:1.15rem;"></i>
        </button>
        <img class="header-avatar" id="header-avatar" alt="" />
        <div class="header-info">
          <div class="header-name" id="char-name">Carregando…</div>
          <div class="header-scenario" id="char-scenario"></div>
        </div>
        <a class="back-btn" href="/" title="Voltar">
          <i class="bi bi-chevron-left" style="font-size:1.05rem;"></i>
        </a>
      </header>

      <main class="messages" id="messages"></main>

      <footer class="input-area">
        <textarea
          id="msg-input"
          placeholder="Escreva uma mensagem…"
          rows="1"
          autocomplete="off"
          autocorrect="off"
        ></textarea>
        <button class="send-btn" id="send-btn" title="Enviar" disabled>
          <i class="bi bi-send-fill" style="font-size:.95rem; margin-left:1px;"></i>
        </button>
      </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/sidebar.js"></script>
    <script>
      const characterId = window.location.pathname.split('/')[2];
      let conversationId = null;
      let isStreaming = false;

      const bgEl        = document.getElementById('bg');
      const headerAvt   = document.getElementById('header-avatar');
      const charNameEl  = document.getElementById('char-name');
      const scenarioEl  = document.getElementById('char-scenario');
      const messagesEl  = document.getElementById('messages');
      const inputEl     = document.getElementById('msg-input');
      const sendBtn     = document.getElementById('send-btn');

      // ── Helpers ──────────────────────────────────────────────────────────

      function scrollToBottom(smooth = false) {
        messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: smooth ? 'smooth' : 'auto' });
      }

      function renderBubbleText(el, text) {
        const escaped = text
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/\n{2,}/g, '\n');
        el.innerHTML = escaped.replace(/\*([^*]+)\*/g, '<em class="action-text">$1</em>');
      }

      function addBubble(role, content, messageId = null) {
        const isUser = role === 'user';
        const row = document.createElement('div');
        row.className = `msg-row msg-row-${isUser ? 'user' : 'char'}`;

        const bubble = document.createElement('div');
        bubble.className = `bubble bubble-${isUser ? 'user' : 'char'}`;

        const textEl = document.createElement('span');
        textEl.className = 'bubble-text';
        renderBubbleText(textEl, content);
        bubble.appendChild(textEl);
        row.appendChild(bubble);

        if (!isUser) {
          // Add regenerate button (hidden until updateLastCharRow marks this as last)
          const regenBtn = document.createElement('button');
          regenBtn.className = 'regenerate-btn';
          regenBtn.title = 'Regenerar resposta';
          regenBtn.innerHTML = '<i class="bi bi-arrow-clockwise"></i>';
          regenBtn.style.display = 'none';
          regenBtn.addEventListener('click', (e) => { e.stopPropagation(); regenerateLastMessage(row); });
          row.appendChild(regenBtn);
        }

        if (messageId) attachRollbackBtn(row, messageId);

        messagesEl.appendChild(row);
        scrollToBottom();
        return { row, textEl };
      }

      function updateLastCharRow() {
        const charRows = [...messagesEl.querySelectorAll('.msg-row-char')];
        charRows.forEach(r => {
          const btn = r.querySelector('.regenerate-btn');
          if (btn) btn.style.display = 'none';
        });
        const last = charRows[charRows.length - 1];
        if (last) {
          const btn = last.querySelector('.regenerate-btn');
          if (btn) btn.style.display = '';
        }
      }

      function attachRollbackBtn(row, messageId) {
        const btn = document.createElement('button');
        btn.className = 'rollback-btn';
        btn.title = 'Retroceder a esta mensagem';
        btn.innerHTML = '<i class="bi bi-arrow-counterclockwise"></i>';
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          openRollbackModal(messageId, row);
        });
        row.appendChild(btn);
      }

      // ── Regenerate last message ───────────────────────────────────────────

      async function regenerateLastMessage(rowEl) {
        if (isStreaming) return;
        isStreaming = true;
        setInputEnabled(false);

        const bubble = rowEl.querySelector('.bubble');
        const regenBtn = rowEl.querySelector('.regenerate-btn');
        if (regenBtn) regenBtn.disabled = true;
        rowEl.querySelector('.rollback-btn')?.remove();

        bubble.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';
        bubble.classList.add('typing-bubble');

        let newContent = '';
        let newTextEl = null;

        try {
          const res = await fetch(`/api/conversations/${conversationId}/regenerate`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
          });

          if (!res.ok) {
            const err = await res.json();
            throw new Error(err.message || 'Erro ao regenerar.');
          }

          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          let buffer = '';

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop() || '';

            for (const line of lines) {
              if (!line.startsWith('data: ')) continue;
              const raw = line.slice(6).trim();
              if (!raw) continue;
              let data;
              try { data = JSON.parse(raw); } catch { continue; }

              if (data.error) throw new Error(data.error);

              if (data.delta) {
                if (!newTextEl) {
                  bubble.classList.remove('typing-bubble');
                  bubble.innerHTML = '';
                  newTextEl = document.createElement('span');
                  newTextEl.className = 'bubble-text';
                  bubble.appendChild(newTextEl);
                }
                newContent += data.delta;
                renderBubbleText(newTextEl, newContent);
                scrollToBottom();
              }

              if (data.done && data.message_id) {
                attachRollbackBtn(rowEl, data.message_id);
              }
            }
          }
        } catch (err) {
          bubble.classList.remove('typing-bubble');
          bubble.innerHTML = '<span class="bubble-text" style="color:#fca5a5;">Erro ao regenerar. Tente novamente.</span>';
          showError(`Erro ao regenerar: ${err.message}`);
        } finally {
          if (regenBtn) regenBtn.disabled = false;
          isStreaming = false;
          setInputEnabled(true);
          inputEl.focus();
          scrollToBottom();
        }
      }

      // ── Rollback modal ────────────────────────────────────────────────────

      let rollbackModal;
      let rollbackTargetId = null;
      let rollbackTargetRow = null;

      function openRollbackModal(messageId, rowEl) {
        rollbackTargetId = messageId;
        rollbackTargetRow = rowEl;
        rollbackModal.show();
      }

      function initRollbackModal() {
        rollbackModal = new bootstrap.Modal(document.getElementById('rollbackModal'));
        document.getElementById('rollback-confirm-btn').addEventListener('click', async () => {
          if (!rollbackTargetId || !conversationId) return;
          rollbackModal.hide();
          try {
            const res = await fetch(`/api/conversations/${conversationId}/rollback`, {
              method: 'DELETE',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ messageId: rollbackTargetId }),
            });
            const data = await res.json();
            if (!data.ok) throw new Error(data.message);

            const rows = [...messagesEl.querySelectorAll('.msg-row')];
            const idx = rows.indexOf(rollbackTargetRow);
            if (idx !== -1) rows.slice(idx + 1).forEach(r => r.remove());
            updateLastCharRow();
          } catch (err) {
            showError(`Erro ao retroceder: ${err.message}`);
          } finally {
            rollbackTargetId = null;
            rollbackTargetRow = null;
          }
        });
      }

      function addTypingIndicator() {
        const el = document.createElement('div');
        el.id = 'typing-indicator';
        el.className = 'bubble bubble-char typing-bubble';
        el.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';
        messagesEl.appendChild(el);
        scrollToBottom();
      }

      function removeTypingIndicator() {
        document.getElementById('typing-indicator')?.remove();
      }

      function showError(text) {
        const el = document.createElement('div');
        el.className = 'system-msg';
        el.textContent = text;
        messagesEl.appendChild(el);
        scrollToBottom();
      }

      function setInputEnabled(enabled) {
        inputEl.disabled = !enabled;
        sendBtn.disabled = !enabled;
      }

      // ── Textarea auto-resize ──────────────────────────────────────────────

      function autoResize() {
        inputEl.style.height = 'auto';
        inputEl.style.height = Math.min(inputEl.scrollHeight, 130) + 'px';
      }

      inputEl.addEventListener('input', autoResize);
      inputEl.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      // ── Send message ──────────────────────────────────────────────────────

      async function sendMessage() {
        if (isStreaming || !conversationId) return;
        const content = inputEl.value.trim();
        if (!content) return;

        inputEl.value = '';
        autoResize();
        const { row: userRow } = addBubble('user', content);
        addTypingIndicator();

        isStreaming = true;
        setInputEnabled(false);

        let charRow = null;
        let charText = null;
        let charRawText = '';

        try {
          const res = await fetch(`/api/conversations/${conversationId}/messages`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ content }),
          });

          if (!res.ok) {
            const err = await res.json();
            throw new Error(err.message || 'Erro ao enviar mensagem.');
          }

          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          let buffer = '';

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop() || '';

            for (const line of lines) {
              if (!line.startsWith('data: ')) continue;
              const raw = line.slice(6).trim();
              if (!raw) continue;

              let data;
              try { data = JSON.parse(raw); } catch { continue; }

              if (data.error) {
                removeTypingIndicator();
                showError(`Erro: ${data.error}`);
                return;
              }

              if (data.delta) {
                if (!charText) {
                  removeTypingIndicator();
                  const b = addBubble('assistant', '');
                  charRow = b.row;
                  charText = b.textEl;
                }
                charRawText += data.delta;
                renderBubbleText(charText, charRawText);
                scrollToBottom();
              }

              if (data.done) {
                if (data.message_id && charRow) attachRollbackBtn(charRow, data.message_id);
                if (data.user_message_id && userRow) attachRollbackBtn(userRow, data.user_message_id);
                updateLastCharRow();
              }
            }
          }
        } catch (err) {
          removeTypingIndicator();
          charRow?.remove();
          showError(`Erro: ${err.message}`);
        } finally {
          removeTypingIndicator();
          isStreaming = false;
          setInputEnabled(true);
          inputEl.focus();
          scrollToBottom();
        }
      }

      sendBtn.addEventListener('click', sendMessage);

      // ── Initialise ────────────────────────────────────────────────────────

      async function init() {
        if (!characterId) {
          charNameEl.textContent = 'Personagem não encontrado';
          showError('URL inválida — nenhum personagem especificado.');
          return;
        }

        try {
          // 1. Load character info + get-or-create conversation (single endpoint)
          const charRes = await fetch(`/api/characters/${characterId}`);
          const charData = await charRes.json();
          if (!charData.ok) throw new Error(charData.message);
          const character = charData.character;

          document.title = `${character.name} — OpenRP AI`;
          charNameEl.textContent = character.name;
          if (character.scenario) scenarioEl.textContent = character.scenario;

          if (character.avatar_url) {
            bgEl.style.backgroundImage = `url('${character.avatar_url}')`;
            headerAvt.src = character.avatar_url;
            headerAvt.style.display = 'block';
          }

          // Populate offcanvas with character info
          document.getElementById('nav-char-name').textContent = character.name;
          if (character.scenario) {
            document.getElementById('nav-char-scenario').textContent = character.scenario;
          }
          if (character.avatar_url) {
            const navAvatar = document.getElementById('nav-avatar');
            navAvatar.src = character.avatar_url;
            navAvatar.style.display = 'block';
            document.getElementById('nav-avatar-placeholder').style.display = 'none';
          }

          // Populate recent chars shortcuts in the offcanvas
          populateRecentChars();

          // 2. Get latest conversation or create a new one (first_message only inserted on creation)
          const convRes = await fetch(`/api/characters/${characterId}/conversation`);
          const convData = await convRes.json();
          if (!convData.ok) throw new Error(convData.message);
          conversationId = convData.conversation.id;

          // 3. Load all messages from the conversation
          const msgsRes = await fetch(`/api/conversations/${conversationId}/messages`);
          const msgsData = await msgsRes.json();
          if (msgsData.ok) {
            for (const msg of msgsData.messages) {
              if (msg.role === 'system') continue;
              addBubble(msg.role, msg.content, msg.id);
            }
            updateLastCharRow();
          }

          setInputEnabled(true);
          inputEl.focus();
          scrollToBottom();
        } catch (err) {
          charNameEl.textContent = 'Erro';
          showError(`Falha ao carregar: ${err.message}`);
        }
      }

      window.addEventListener('load', () => {
        initRollbackModal();
        init();
      });
    </script>
  </body>
</html>
