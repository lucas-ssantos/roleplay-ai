<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Conversas — OpenRP AI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="/assets/css/styles.css" />
    <link rel="stylesheet" href="/assets/css/sidebar.css" />
    <style>
      .char-hero-avatar {
        width: 84px; height: 84px; object-fit: cover; border-radius: 1rem;
        border: 1px solid rgba(148,163,184,0.2);
      }
      .char-hero-placeholder {
        width: 84px; height: 84px; border-radius: 1rem; display: flex;
        align-items: center; justify-content: center; font-size: 2rem; color: #475569;
        background: rgba(30,41,59,0.6); border: 1px solid rgba(148,163,184,0.2);
      }
      .conv-item {
        display: flex; align-items: center; gap: .9rem; width: 100%; text-align: left;
        padding: 1rem 1.1rem; cursor: pointer; text-decoration: none;
        border: 1px solid rgba(148,163,184,0.12); border-radius: 1rem;
        background: rgba(15,23,42,0.55); transition: border-color .15s, transform .15s, background .15s;
      }
      .conv-item:hover { border-color: rgba(56,189,248,0.45); background: rgba(15,23,42,0.8); transform: translateY(-1px); }
      .conv-item .conv-title { color: #f1f5f9; font-weight: 600; font-size: .98rem; }
      .conv-item .conv-scenario { color: #94a3b8; font-size: .85rem; line-height: 1.45;
        display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
      .conv-item .conv-meta { color: #64748b; font-size: .76rem; margin-top: .15rem; }
      .conv-item .conv-arrow { color: #38bdf8; font-size: 1.1rem; margin-left: auto; }
    </style>
  </head>
  <body>
    <div class="d-flex min-vh-100">
      <div id="sidebar-root" class="flex-shrink-0"></div>

      <div class="flex-grow-1 overflow-auto">
        <main class="content-main p-3 p-md-4">
          <div class="mx-auto" style="max-width:760px;">

            <!-- Header do personagem -->
            <div class="glass-card card p-4 mb-4">
              <div class="d-flex align-items-center gap-3">
                <img id="char-avatar" class="char-hero-avatar" alt="" style="display:none;" />
                <div id="char-avatar-placeholder" class="char-hero-placeholder"><i class="bi bi-person-fill"></i></div>
                <div class="flex-grow-1" style="min-width:0;">
                  <h1 class="fw-bold mb-1" style="font-size:clamp(1.5rem,3vw,2rem); letter-spacing:-0.03em;" id="char-name">Carregando…</h1>
                  <p class="text-secondary mb-0" id="char-desc" style="line-height:1.5;"></p>
                </div>
                <a id="edit-char-btn" class="btn btn-outline-secondary flex-shrink-0" href="#" title="Editar personagem">
                  <i class="bi bi-pencil"></i>
                </a>
              </div>
            </div>

            <!-- Lista de conversas -->
            <div class="d-flex align-items-center justify-content-between mb-3">
              <h2 class="fw-bold mb-0" style="font-size:1.2rem; letter-spacing:-0.02em;">Conversas</h2>
              <button type="button" class="btn-sky" data-bs-toggle="modal" data-bs-target="#newConvModal">
                <i class="bi bi-plus-circle me-2"></i>Nova conversa
              </button>
            </div>

            <div id="conv-list" class="d-flex flex-column gap-2">
              <p class="text-secondary small mb-0"><i class="bi bi-hourglass-split me-1"></i>Carregando conversas…</p>
            </div>

          </div>
        </main>
      </div>
    </div>

    <!-- ── Modal: nova conversa ─────────────────────────────────────── -->
    <div class="modal fade" id="newConvModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="background:rgba(6,12,30,0.98); border:1px solid rgba(148,163,184,0.15); border-radius:1.1rem;">
          <div class="modal-header" style="border-bottom:1px solid rgba(148,163,184,0.1);">
            <h6 class="modal-title mb-0" style="color:#f1f5f9; font-weight:700;">
              <i class="bi bi-plus-circle me-2" style="color:#38bdf8;"></i>Nova conversa
            </h6>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
          </div>
          <form id="new-conv-form">
            <div class="modal-body" style="padding:1.25rem;">
              <div class="mb-3">
                <label class="form-label" for="conv-title">Título <span class="text-secondary small">(opcional)</span></label>
                <input id="conv-title" type="text" class="form-control" placeholder="Ex.: Taverna ao anoitecer" />
              </div>
              <div class="mb-3">
                <label class="form-label" for="conv-scenario">Cenário</label>
                <textarea id="conv-scenario" class="form-control" rows="3" placeholder="Explique a situação onde a conversa começa..."></textarea>
              </div>
              <div class="mb-2">
                <label class="form-label" for="conv-first-message">Mensagem inicial</label>
                <textarea id="conv-first-message" class="form-control" rows="3" placeholder="Primeira fala do personagem... Use {{user}} para o nome do jogador."></textarea>
              </div>
              <div id="conv-error" class="alert-glass-error mt-3" role="status" style="display:none;"></div>
            </div>
            <div class="modal-footer" style="border-top:1px solid rgba(148,163,184,0.1);">
              <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
              <button type="submit" class="btn-sky">
                <i class="bi bi-chat-dots me-2"></i>Iniciar conversa
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/sidebar.js"></script>
    <script src="/assets/js/conversations.js"></script>
  </body>
</html>
