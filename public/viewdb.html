<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Banco de Dados — OpenRP AI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="/assets/css/styles.css" />
    <link rel="stylesheet" href="/assets/css/sidebar.css" />
    <link rel="stylesheet" href="/assets/css/viewdb.css" />
  </head>
  <body>
    <div class="d-flex min-vh-100">
      <div id="sidebar-root" class="flex-shrink-0"></div>

      <div class="flex-grow-1 overflow-auto">
        <main class="content-main p-3 p-md-4">
          <div class="mx-auto" style="max-width:1100px;">

            <div class="mb-4">
              <h1 class="fw-bold mb-1" style="font-size:clamp(1.8rem,3vw,2.4rem); letter-spacing:-0.04em;">Banco de dados</h1>
              <p class="text-secondary mb-0">Visualize até os 25 últimos registros de cada tabela.</p>
            </div>

            <div class="row g-4">

              <!-- Tabelas -->
              <div class="col-12 col-md-4">
                <div class="glass-card card p-4 h-100">
                  <div class="d-flex align-items-center gap-2 mb-3">
                    <i class="bi bi-database text-info"></i>
                    <h6 class="mb-0 fw-semibold">Tabelas</h6>
                  </div>
                  <div id="status" class="text-secondary small mb-3">
                    <i class="bi bi-hourglass-split me-1"></i>Carregando tabelas…
                  </div>
                  <div class="d-flex flex-column gap-2" id="table-list"></div>
                </div>
              </div>

              <!-- Registros -->
              <div class="col-12 col-md-8">
                <div class="glass-card card p-4">
                  <div class="d-flex align-items-center gap-2 mb-3">
                    <i class="bi bi-table text-info"></i>
                    <h6 class="mb-0 fw-semibold">Registros</h6>
                  </div>
                  <div id="records-container">
                    <p class="text-secondary small">Selecione uma tabela à esquerda para ver os registros.</p>
                  </div>
                </div>
              </div>

            </div>
          </div>
        </main>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/sidebar.js"></script>
    <script src="/assets/js/viewdb.js"></script>
  </body>
</html>
