<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenRP AI — Status</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="/assets/css/styles.css" />
  </head>
  <body class="d-flex align-items-center justify-content-center min-vh-100 p-3">

    <div class="glass-card card p-4 p-md-5" style="max-width:520px; width:100%;">
      <div class="mb-3">
        <span class="fw-bold" style="color:#38bdf8; font-size:.85rem; letter-spacing:.1em; text-transform:uppercase;">OpenRP AI</span>
      </div>
      <h1 class="fw-bold mb-2" style="font-size:1.9rem; letter-spacing:-0.03em;">Verificando serviços</h1>
      <p class="text-secondary mb-4">Aguarde enquanto verificamos se o Ollama e o banco de dados estão prontos.</p>

      <div class="d-flex flex-column gap-3">
        <div class="d-flex align-items-start gap-3 p-3 rounded-3" style="background:rgba(15,23,42,0.7); border:1px solid rgba(148,163,184,0.1);" id="ollama-status">
          <i class="bi bi-cpu fs-5 mt-1" style="color:#38bdf8; flex-shrink:0;"></i>
          <div>
            <div class="fw-semibold mb-1" style="font-size:.9rem;">Ollama</div>
            <div class="small" style="color:#38bdf8;">
              <i class="bi bi-arrow-repeat me-1 spin"></i>Verificando…
            </div>
          </div>
        </div>

        <div class="d-flex align-items-start gap-3 p-3 rounded-3" style="background:rgba(15,23,42,0.7); border:1px solid rgba(148,163,184,0.1);" id="db-status">
          <i class="bi bi-database fs-5 mt-1" style="color:#38bdf8; flex-shrink:0;"></i>
          <div>
            <div class="fw-semibold mb-1" style="font-size:.9rem;">Banco de dados</div>
            <div class="small" style="color:#38bdf8;">
              <i class="bi bi-arrow-repeat me-1 spin"></i>Verificando…
            </div>
          </div>
        </div>
      </div>
    </div>

      <script src="/assets/js/check.js"></script>
  </body>
</html>
