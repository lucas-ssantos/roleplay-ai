<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Novo Personagem — OpenRP AI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="/assets/css/styles.css" />
    <link rel="stylesheet" href="/assets/css/sidebar.css" />
  </head>
  <body>
    <div class="d-flex min-vh-100">
      <div id="sidebar-root" class="flex-shrink-0"></div>

      <div class="flex-grow-1 overflow-auto">
        <main class="content-main p-3 p-md-4">
          <div class="mx-auto" style="max-width:680px;">

            <div class="mb-4">
              <h1 class="fw-bold mb-1" style="font-size:clamp(1.8rem,3vw,2.4rem); letter-spacing:-0.04em;">Novo personagem</h1>
              <p class="text-secondary mb-0">Defina quem o personagem é. O cenário e a mensagem inicial são definidos depois, ao criar cada conversa.</p>
            </div>

            <div class="glass-card card p-4">
              <form id="character-form">

                <div class="mb-3">
                  <label class="form-label" for="name">Nome <span class="text-danger">*</span></label>
                  <input id="name" name="name" type="text" class="form-control" placeholder="Nome único do personagem" required />
                </div>

                <div class="mb-3">
                  <label class="form-label" for="description">Descrição física</label>
                  <textarea id="description" name="description" class="form-control" placeholder="Aparência e traços físicos do personagem..."></textarea>
                </div>

                <div class="mb-3">
                  <label class="form-label" for="personality">Personalidade</label>
                  <textarea id="personality" name="personality" class="form-control" placeholder="Como o personagem age e fala..."></textarea>
                </div>

                <div class="row g-3 mb-4">
                  <div class="col-12 col-sm-6">
                    <label class="form-label" for="likes">Gosta de</label>
                    <textarea id="likes" name="likes" class="form-control" placeholder="Coisas que o personagem aprecia..."></textarea>
                  </div>
                  <div class="col-12 col-sm-6">
                    <label class="form-label" for="dislikes">Não gosta de</label>
                    <textarea id="dislikes" name="dislikes" class="form-control" placeholder="Coisas que o personagem detesta..."></textarea>
                  </div>
                </div>

                <div class="glass-card card p-3 mb-4" style="border-radius:.85rem !important;">
                  <p class="fw-semibold mb-3 d-flex align-items-center gap-2" style="color:#cbd5e1; font-size:.9rem;">
                    <i class="bi bi-image text-info"></i> Imagem do personagem
                  </p>
                  <div class="row g-3">
                    <div class="col-12 col-sm-6">
                      <label class="form-label" for="avatar_upload">Upload de arquivo</label>
                      <input id="avatar_upload" name="avatar_upload" type="file" accept="image/*" class="form-control" />
                      <div class="form-text mt-1">Envie uma imagem salva no servidor.</div>
                    </div>
                    <div class="col-12 col-sm-6">
                      <label class="form-label" for="avatar_link">Ou use um link</label>
                      <input id="avatar_link" name="avatar_link" type="url" class="form-control" placeholder="https://..." />
                      <div class="form-text mt-1">URL pública de uma imagem.</div>
                    </div>
                  </div>
                </div>

                <div id="msg-error" class="alert-glass-error mb-3" role="status" style="display:none;"></div>
                <div id="msg-success" class="alert-glass-success mb-3" role="status" style="display:none;"></div>

                <button type="submit" class="btn-sky w-100">
                  <i class="bi bi-check-circle me-2"></i>Salvar personagem
                </button>

              </form>
            </div>

          </div>
        </main>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/sidebar.js"></script>
    <script src="/assets/js/new-character.js"></script>
  </body>
</html>
