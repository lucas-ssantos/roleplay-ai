<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lorebooks — OpenRP AI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="/assets/css/styles.css" />
    <link rel="stylesheet" href="/assets/css/sidebar.css" />
    <link rel="stylesheet" href="/assets/css/lorebooks.css" />
  </head>
  <body>
    <div class="d-flex min-vh-100">
      <div id="sidebar-root" class="flex-shrink-0"></div>

      <div class="flex-grow-1 overflow-auto">
        <main class="content-main p-3 p-md-4">

          <div class="mb-4 d-flex align-items-start justify-content-between gap-3 flex-wrap">
            <div>
              <h1 class="fw-bold mb-1" style="font-size:clamp(1.8rem,3vw,2.5rem); letter-spacing:-0.04em;">Lorebooks</h1>
              <p class="text-secondary mb-0">Informações de mundo, NPCs e contexto extra para enriquecer o roleplay. Ativados por palavras-chave durante o chat.</p>
            </div>
            <button class="btn-sky flex-shrink-0" onclick="openCreateModal()">
              <i class="bi bi-plus-lg me-2"></i>Novo lorebook
            </button>
          </div>

          <div class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 row-cols-xl-4 g-4" id="lorebook-grid">
            <div class="col d-flex align-items-center justify-content-center" id="grid-loading" style="min-height:180px;">
              <div class="spinner-border text-info" role="status"></div>
            </div>
          </div>

        </main>
      </div>
    </div>

    <!-- Create / Edit Modal -->
    <div class="modal fade" id="lorebookModal" tabindex="-1" aria-labelledby="lorebookModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content" style="background:rgba(6,12,30,0.97); border:1px solid rgba(148,163,184,0.15);">
          <div class="modal-header border-0 pb-1">
            <h5 class="modal-title" id="lorebookModalLabel">Novo lorebook</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Fechar"></button>
          </div>
          <div class="modal-body pt-2">
            <input type="hidden" id="lb-id" value="" />

            <div class="mb-3">
              <label class="form-label" for="lb-title">Título <span class="text-danger">*</span></label>
              <input id="lb-title" type="text" class="form-control" placeholder="Ex: Facção dos Corvos, Reino de Aelindra, NPC: Morgath..." />
            </div>

            <div class="mb-3">
              <label class="form-label" for="lb-keywords">Palavras-chave
                <span class="text-secondary" style="font-size:.8rem; font-weight:400;">(separadas por vírgula — deixe vazio para sempre injetar)</span>
              </label>
              <input id="lb-keywords" type="text" class="form-control" placeholder="corvos, guilda, capitão..." />
            </div>

            <div class="mb-3">
              <label class="form-label" for="lb-content">Conteúdo <span class="text-danger">*</span></label>
              <textarea id="lb-content" class="form-control lb-textarea" rows="8"
                placeholder="Descreva o elemento de mundo, NPC, facção, localização ou qualquer contexto que a IA deve saber quando as palavras-chave aparecerem no chat..."></textarea>
            </div>

            <div class="mb-1" style="max-width:180px;">
              <label class="form-label" for="lb-order">Ordem de inserção
                <span class="text-secondary" style="font-size:.8rem; font-weight:400;">(menor = maior prioridade)</span>
              </label>
              <input id="lb-order" type="number" class="form-control" value="0" min="0" />
            </div>

            <div id="lb-error" class="alert-glass-error mt-3" role="alert" style="display:none;"></div>
          </div>
          <div class="modal-footer border-0 pt-0">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="button" class="btn-sky" id="lb-save-btn" onclick="saveLorebook()">
              <i class="bi bi-check-circle me-1"></i>Salvar
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div class="modal fade" id="deleteModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="background:rgba(6,12,30,0.97); border:1px solid rgba(148,163,184,0.15);">
          <div class="modal-header border-0">
            <h5 class="modal-title">Excluir lorebook</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Fechar"></button>
          </div>
          <div class="modal-body">
            <p class="mb-1">Tem certeza que deseja excluir <strong id="delete-lb-title"></strong>?</p>
            <p class="text-secondary small mb-0">Esta ação também remove o lorebook de todos os personagens associados.</p>
          </div>
          <div class="modal-footer border-0">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="button" class="btn btn-danger" id="delete-confirm-btn">
              <i class="bi bi-trash me-1"></i>Excluir
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/sidebar.js"></script>
    <script src="/assets/js/lorebooks.js"></script>
  </body>
</html>
