<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Configurações — OpenRP AI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="/assets/css/styles.css" />
    <style>
      .preset-btn {
        background: rgba(30, 41, 59, 0.8);
        border: 2px solid rgba(51, 65, 85, 0.8);
        border-radius: 0.85rem;
        color: #cbd5e1;
        padding: 1rem 1.1rem;
        text-align: left;
        cursor: pointer;
        width: 100%;
        transition: border-color 0.2s, background 0.2s, color 0.2s;
      }
      .preset-btn:hover {
        border-color: rgba(100, 116, 139, 0.8);
        background: rgba(15, 23, 42, 0.9);
        color: #e2e8f0;
      }
      .preset-btn.active {
        border-color: #38bdf8;
        background: rgba(12, 74, 110, 0.45);
        color: #38bdf8;
        box-shadow: 0 0 18px rgba(56, 189, 248, 0.18);
      }
      .preset-btn strong { display: block; font-size: .95rem; margin-bottom: .3rem; }
      .preset-btn small  { font-size: .82rem; color: #64748b; }
      .preset-btn.active small { color: #7dd3fc; }

      .field-section {
        background: rgba(15, 23, 42, 0.6);
        border: 1px solid rgba(148, 163, 184, 0.1);
        border-radius: 1rem;
        padding: 1.25rem;
      }

      .field-section-title {
        font-size: .88rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: .06em;
        color: #64748b;
        margin-bottom: 1rem;
        display: flex;
        align-items: center;
        gap: .5rem;
      }
    </style>
  </head>
  <body>
    <div class="d-flex min-vh-100">
      <div id="sidebar-root" class="flex-shrink-0"></div>

      <div class="flex-grow-1 overflow-auto">
        <main class="content-main p-3 p-md-4">
          <div class="mx-auto" style="max-width:860px;">

            <div class="mb-4">
              <h1 class="fw-bold mb-1" style="font-size:clamp(1.8rem,3vw,2.4rem); letter-spacing:-0.04em;">Configurações globais</h1>
              <p class="text-secondary mb-0">Parâmetros de geração do Ollama. Escolha um preset ou customize manualmente.</p>
            </div>

            <!-- Presets -->
            <div class="row g-3 mb-4" id="presets"></div>

            <hr style="border-color:rgba(148,163,184,0.12); margin: 1.5rem 0;" />

            <!-- Feedback message -->
            <div id="feedback-msg" class="mb-4" style="display:none;"></div>

            <form id="settings-form" class="d-flex flex-column gap-4">

              <!-- Modelo -->
              <div class="glass-card card p-4">
                <div class="field-section-title"><i class="bi bi-cpu"></i> Modelo</div>
                <select id="model" name="model" class="form-select" required>
                  <option value="">— Selecione um modelo —</option>
                  <optgroup label="Fracos (4b · ~3-4 GB VRAM)">
                    <option value="qwen3:4b">Qwen3 4B</option>
                    <option value="llama2:4b">Llama2 4B</option>
                    <option value="mistral:4b">Mistral 4B</option>
                  </optgroup>
                  <optgroup label="Médios (7b · ~5-6 GB VRAM)">
                    <option value="qwen3:7b">Qwen3 7B</option>
                    <option value="llama2:7b">Llama2 7B</option>
                    <option value="mistral:7b">Mistral 7B</option>
                  </optgroup>
                  <optgroup label="Fortes (8b-13b · ~6-10 GB VRAM)">
                    <option value="qwen3:8b">Qwen3 8B (Recomendado)</option>
                    <option value="llama2:8b">Llama2 8B</option>
                    <option value="mistral:8b">Mistral 8B</option>
                    <option value="neural-chat:7b">Neural Chat 7B</option>
                  </optgroup>
                  <optgroup label="Premium (13b+ · 10-16+ GB VRAM)">
                    <option value="qwen3:13b">Qwen3 13B</option>
                    <option value="llama2:13b">Llama2 13B</option>
                    <option value="mistral:13b">Mistral 13B</option>
                  </optgroup>
                </select>
              </div>

              <!-- Sampling -->
              <div class="glass-card card p-4">
                <div class="field-section-title"><i class="bi bi-sliders2"></i> Parâmetros de sampling</div>
                <div class="row g-3">
                  <div class="col-12 col-sm-6 col-lg-4">
                    <label class="form-label d-flex align-items-center gap-1">
                      Temperature
                      <i class="bi bi-info-circle text-secondary" style="font-size:.8rem;"
                         data-bs-toggle="tooltip"
                         title="Criatividade geral. 0.1–0.5 = previsível. 0.6–1.0 = roleplay ideal. 1.1+ = caótico."></i>
                    </label>
                    <input type="number" id="temperature" name="temperature" class="form-control" min="0" max="2" step="0.01" />
                  </div>
                  <div class="col-12 col-sm-6 col-lg-4">
                    <label class="form-label d-flex align-items-center gap-1">
                      Top P
                      <i class="bi bi-info-circle text-secondary" style="font-size:.8rem;"
                         data-bs-toggle="tooltip"
                         title="Nucleus sampling. Mantém X% mais prováveis. 0.95 é o padrão para roleplay."></i>
                    </label>
                    <input type="number" id="top_p" name="top_p" class="form-control" min="0" max="1" step="0.01" />
                  </div>
                  <div class="col-12 col-sm-6 col-lg-4">
                    <label class="form-label d-flex align-items-center gap-1">
                      Top K
                      <i class="bi bi-info-circle text-secondary" style="font-size:.8rem;"
                         data-bs-toggle="tooltip"
                         title="Mantém K tokens mais prováveis. &lt;20 = repetitivo. 80+ = criativo."></i>
                    </label>
                    <input type="number" id="top_k" name="top_k" class="form-control" min="0" max="500" step="1" />
                  </div>
                  <div class="col-12 col-sm-6 col-lg-4">
                    <label class="form-label d-flex align-items-center gap-1">
                      Min P
                      <i class="bi bi-info-circle text-secondary" style="font-size:.8rem;"
                         data-bs-toggle="tooltip"
                         title="Filtro adaptativo. Descarta tokens com prob. menor que min_p × max_prob."></i>
                    </label>
                    <input type="number" id="min_p" name="min_p" class="form-control" min="0" max="1" step="0.01" />
                  </div>
                  <div class="col-12 col-sm-6 col-lg-4">
                    <label class="form-label d-flex align-items-center gap-1">
                      TFS Z
                      <i class="bi bi-info-circle text-secondary" style="font-size:.8rem;"
                         data-bs-toggle="tooltip"
                         title="Tail Free Sampling. Remove cauda de baixa probabilidade. 1.0 = desativado."></i>
                    </label>
                    <input type="number" id="tfs_z" name="tfs_z" class="form-control" min="0" max="1" step="0.01" />
                  </div>
                </div>
              </div>

              <!-- Repetição -->
              <div class="glass-card card p-4">
                <div class="field-section-title"><i class="bi bi-arrow-repeat"></i> Parâmetros de repetição</div>
                <div class="row g-3">
                  <div class="col-12 col-sm-6">
                    <label class="form-label d-flex align-items-center gap-1">
                      Repeat Penalty
                      <i class="bi bi-info-circle text-secondary" style="font-size:.8rem;"
                         data-bs-toggle="tooltip"
                         title="1.0 = sem penalidade. 1.05–1.1 = suave (roleplay). 1.2+ = agressivo."></i>
                    </label>
                    <input type="number" id="repeat_penalty" name="repeat_penalty" class="form-control" min="1" max="2" step="0.01" />
                  </div>
                  <div class="col-12 col-sm-6">
                    <label class="form-label d-flex align-items-center gap-1">
                      Repeat Last N
                      <i class="bi bi-info-circle text-secondary" style="font-size:.8rem;"
                         data-bs-toggle="tooltip"
                         title="Tokens passados a observar. 128 ≈ 100 palavras. 192-256 ≈ 150-200 palavras."></i>
                    </label>
                    <input type="number" id="repeat_last_n" name="repeat_last_n" class="form-control" min="0" max="1000" step="1" />
                  </div>
                </div>
              </div>

              <!-- Contexto e saída -->
              <div class="glass-card card p-4">
                <div class="field-section-title"><i class="bi bi-layers"></i> Contexto e saída</div>
                <div class="row g-3">
                  <div class="col-12 col-sm-6 col-lg-4">
                    <label class="form-label d-flex align-items-center gap-1">
                      Context Size
                      <i class="bi bi-info-circle text-secondary" style="font-size:.8rem;"
                         data-bs-toggle="tooltip"
                         title="Tokens de histórico. 4k≈6-7GB, 8k≈7-8GB, 16k≈9-11GB. Impacto quadrático na VRAM."></i>
                    </label>
                    <input type="number" id="context_size" name="context_size" class="form-control" min="512" max="65536" step="512" />
                  </div>
                  <div class="col-12 col-sm-6 col-lg-4">
                    <label class="form-label d-flex align-items-center gap-1">
                      Msgs de contexto (por papel)
                      <i class="bi bi-info-circle text-secondary" style="font-size:.8rem;"
                         data-bs-toggle="tooltip"
                         title="Quantas mensagens do usuário E do personagem incluir no histórico enviado ao modelo. Ex.: 6 = últimas 6 de cada."></i>
                    </label>
                    <input type="number" id="num_ctx_messages" name="num_ctx_messages" class="form-control" min="1" max="100" step="1" />
                  </div>
                  <div class="col-12 col-sm-6 col-lg-4">
                    <label class="form-label d-flex align-items-center gap-1">
                      Mín. tokens (resposta)
                      <i class="bi bi-info-circle text-secondary" style="font-size:.8rem;"
                         data-bs-toggle="tooltip"
                         title="Mínimo de tokens que o personagem gera, mesmo para mensagens curtas. 50–80 = respostas breves mas completas."></i>
                    </label>
                    <input type="number" id="min_tokens" name="min_tokens" class="form-control" min="10" max="500" step="1" />
                  </div>
                  <div class="col-12 col-sm-6 col-lg-4">
                    <label class="form-label d-flex align-items-center gap-1">
                      Máx. tokens (resposta)
                      <i class="bi bi-info-circle text-secondary" style="font-size:.8rem;"
                         data-bs-toggle="tooltip"
                         title="Teto do modo dinâmico. -1 = sem teto (usa 500 internamente). 300–500 evita respostas longas demais."></i>
                    </label>
                    <input type="number" id="max_tokens" name="max_tokens" class="form-control" min="-1" max="4096" step="1" />
                  </div>
                  <div class="col-12 col-sm-6 col-lg-4">
                    <label class="form-label d-flex align-items-center gap-1">
                      Stream
                      <i class="bi bi-info-circle text-secondary" style="font-size:.8rem;"
                         data-bs-toggle="tooltip"
                         title="Se ativo, tokens chegam em tempo real (efeito digitando). Sem impacto na velocidade total."></i>
                    </label>
                    <select id="stream" name="stream" class="form-select">
                      <option value="1">Ativo (streaming)</option>
                      <option value="0">Inativo</option>
                    </select>
                  </div>
                  <div class="col-12 col-sm-6">
                    <label class="form-label d-flex align-items-center gap-1">
                      Seed
                      <i class="bi bi-info-circle text-secondary" style="font-size:.8rem;"
                         data-bs-toggle="tooltip"
                         title="-1 = aleatório. Número fixo = reproduz exatamente a mesma resposta."></i>
                    </label>
                    <input type="number" id="seed" name="seed" class="form-control" placeholder="-1" />
                  </div>
                </div>
              </div>

              <!-- Stop tokens -->
              <div class="glass-card card p-4">
                <div class="field-section-title"><i class="bi bi-sign-stop"></i> Stop tokens</div>
                <textarea id="stop" name="stop" class="form-control" rows="2"
                          placeholder="User:, Human:, ### User"></textarea>
                <div class="form-text mt-2">
                  Strings que encerram a geração, separadas por vírgula. Ex: <code>User:, Human:, ### User</code>
                </div>
              </div>

              <!-- Buttons -->
              <div class="d-flex gap-3 justify-content-end">
                <button type="button" class="btn-muted" onclick="window.history.back()">
                  <i class="bi bi-arrow-left me-1"></i>Cancelar
                </button>
                <button type="submit" class="btn-sky">
                  <i class="bi bi-floppy me-2"></i>Salvar configurações
                </button>
              </div>

            </form>
          </div>
        </main>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/sidebar.js"></script>
    <script>
      let presetsData = {};
      const form      = document.getElementById('settings-form');
      const feedbackEl = document.getElementById('feedback-msg');

      function showFeedback(text, isError = false) {
        feedbackEl.className = isError ? 'alert-glass-error' : 'alert-glass-success';
        feedbackEl.innerHTML = `<i class="bi bi-${isError ? 'exclamation-triangle' : 'check-circle'} me-2"></i>${text}`;
        feedbackEl.style.display = 'block';
        if (!isError) setTimeout(() => { feedbackEl.style.display = 'none'; }, 4000);
      }

      async function loadPresets() {
        try {
          const res  = await fetch('/api/presets');
          const data = await res.json();
          if (data.ok && data.presets) {
            presetsData = data.presets;
            renderPresets();
          }
        } catch { showFeedback('Erro ao carregar presets.', true); }
      }

      async function loadConfig() {
        try {
          const res  = await fetch('/api/config');
          const data = await res.json();
          if (data.ok && data.config) fillForm(data.config);
        } catch { /* silent */ }
      }

      function fillForm(config) {
        document.getElementById('model').value          = config.model          || '';
        document.getElementById('temperature').value    = config.temperature    ?? '';
        document.getElementById('top_p').value          = config.top_p          ?? '';
        document.getElementById('top_k').value          = config.top_k          ?? '';
        document.getElementById('min_p').value          = config.min_p          ?? '';
        document.getElementById('tfs_z').value          = config.tfs_z          ?? '';
        document.getElementById('repeat_penalty').value = config.repeat_penalty ?? '';
        document.getElementById('repeat_last_n').value  = config.repeat_last_n  ?? '';
        document.getElementById('context_size').value      = config.context_size      ?? '';
        document.getElementById('num_ctx_messages').value  = config.num_ctx_messages  ?? '';
        document.getElementById('min_tokens').value        = config.min_tokens        ?? '';
        document.getElementById('max_tokens').value     = config.max_tokens     ?? '';
        document.getElementById('stream').value         = config.stream ? '1' : '0';
        document.getElementById('seed').value           = config.seed           ?? '';
        if (config.stop) {
          document.getElementById('stop').value =
            Array.isArray(config.stop) ? config.stop.join(', ') : config.stop;
        }
      }

      function loadPreset(key) {
        const preset = presetsData[key];
        if (!preset?.config) return showFeedback('Erro ao carregar preset.', true);
        fillForm(preset.config);
        document.querySelectorAll('.preset-btn').forEach((btn) => {
          btn.classList.toggle('active', btn.dataset.preset === key);
        });
        showFeedback(`Preset "${preset.name}" carregado.`);
      }

      function renderPresets() {
        const el = document.getElementById('presets');
        el.innerHTML = Object.entries(presetsData).map(([key, p]) => `
          <div class="col-12 col-sm-4">
            <button type="button" class="preset-btn" data-preset="${key}" onclick="loadPreset('${key}')">
              <strong>${p.name}</strong>
              <small>${p.desc}</small>
            </button>
          </div>
        `).join('');
      }

      async function handleSubmit(e) {
        e.preventDefault();
        feedbackEl.style.display = 'none';

        const stopStr = document.getElementById('stop').value.trim();
        const stop = stopStr.split(',').map(s => s.trim()).filter(Boolean);

        const config = {
          model:          document.getElementById('model').value.trim(),
          temperature:    parseFloat(document.getElementById('temperature').value)    || null,
          top_p:          parseFloat(document.getElementById('top_p').value)          || null,
          top_k:          parseInt(document.getElementById('top_k').value)            || null,
          min_p:          parseFloat(document.getElementById('min_p').value)          || null,
          tfs_z:          parseFloat(document.getElementById('tfs_z').value)          || null,
          repeat_penalty: parseFloat(document.getElementById('repeat_penalty').value) || null,
          repeat_last_n:  parseInt(document.getElementById('repeat_last_n').value)    || null,
          context_size:     parseInt(document.getElementById('context_size').value)     || null,
          num_ctx_messages: parseInt(document.getElementById('num_ctx_messages').value) || null,
          min_tokens:       parseInt(document.getElementById('min_tokens').value)       || null,
          max_tokens:     parseInt(document.getElementById('max_tokens').value)       || null,
          stream:         parseInt(document.getElementById('stream').value)           || null,
          seed:           parseInt(document.getElementById('seed').value)             || -1,
          stop,
        };

        try {
          const res    = await fetch('/api/config', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(config),
          });
          const result = await res.json();
          if (!res.ok || !result.ok) throw new Error(result.message || 'Erro ao salvar.');
          showFeedback('Configuração salva com sucesso!');
        } catch (err) {
          showFeedback(err.message || 'Erro ao salvar configuração.', true);
        }
      }

      window.addEventListener('load', async () => {
        await loadSidebar();
        await Promise.all([loadPresets(), loadConfig()]);
        form.addEventListener('submit', handleSubmit);

        // Bootstrap tooltips
        document.querySelectorAll('[data-bs-toggle="tooltip"]').forEach(
          (el) => new bootstrap.Tooltip(el)
        );
      });
    </script>
  </body>
</html>
